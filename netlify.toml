[build]
  command = "npm ci && npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Redirect API calls to Netlify function
[[redirects]]
  from = "/api/publish"
  to = "/.netlify/functions/publish"
  status = 200

# SPA fallback - all routes go to index.html EXCEPT static assets
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Role = ["admin"]}

# Allow static assets through
[[redirects]]
  from = "/admin.html"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/config.json"
  to = "/config.json"
  status = 200

[[redirects]]
  from = "/images/*"
  to = "/images/:splat"
  status = 200

[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
