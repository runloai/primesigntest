<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrimeSign Admin</title>
<style>
:root{--bg:#0a0a0f;--card:#111118;--border:#1a1a25;--gold:#f0a830;--cyan:#00d4ff;--text:#eee;--muted:#777}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;width:360px;text-align:center}
.login-box h2{color:var(--gold);margin-bottom:24px;font-size:24px}
.login-box input{width:100%;padding:12px;margin:8px 0;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px}
.login-box button{width:100%;padding:12px;margin-top:16px;background:var(--gold);color:#000;border:none;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer}
.login-box .error{color:#f44;margin-top:8px;font-size:13px;display:none}
.dashboard{display:none;max-width:1200px;margin:0 auto;padding:20px}
.dashboard.active,.login-screen.hidden{display:block}
.login-screen.hidden{display:none}
header{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:1px solid var(--border);margin-bottom:24px}
header h1{color:var(--gold);font-size:22px}
header button{background:#333;color:var(--text);border:none;padding:8px 20px;border-radius:8px;cursor:pointer}
.tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.tab{padding:8px 20px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--muted);cursor:pointer;font-size:14px}
.tab.active{background:var(--gold);color:#000;border-color:var(--gold);font-weight:bold}
.tab-content{display:none}
.tab-content.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.card h3{color:var(--cyan);margin-bottom:16px;font-size:16px}
input[type="text"],input[type="url"],textarea{width:100%;padding:10px;margin:6px 0 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:inherit}
textarea{min-height:80px;resize:vertical}
label{font-size:13px;color:var(--muted);display:block;margin-top:8px}
.btn{display:inline-block;padding:10px 24px;border-radius:8px;border:none;font-size:14px;cursor:pointer;font-weight:bold;margin:4px}
.btn-gold{background:var(--gold);color:#000}
.btn-cyan{background:var(--cyan);color:#000}
.btn-red{background:#e04040;color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.preview-img{max-width:200px;max-height:120px;border-radius:8px;object-fit:cover;margin:4px}
.color-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.color-chip{padding:12px;border-radius:8px;text-align:center;cursor:pointer;border:2px solid transparent;font-size:12px;font-weight:bold}
.color-chip.selected{border-color:var(--gold)}
.service-row,.portfolio-row{display:flex;gap:8px;align-items:center;margin:8px 0;flex-wrap:wrap}
.service-row input,.portfolio-row input{flex:1;min-width:120px}
.section-divider{border-top:1px solid var(--border);margin:24px 0;padding-top:16px}
.image-upload-area{border:2px dashed var(--border);border-radius:12px;padding:24px;text-align:center;cursor:pointer;margin:12px 0;color:var(--muted)}
.image-upload-area:hover{border-color:var(--cyan);color:var(--cyan)}
.upload-progress{display:none;background:var(--cyan);height:4px;border-radius:2px;margin:8px 0}
canvas{display:none}
.save-bar{position:sticky;bottom:20px;background:var(--card);border:1px solid var(--gold);border-radius:12px;padding:12px 20px;display:flex;justify-content:space-between;align-items:center}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h2>🔐 PrimeSign Admin</h2>
    <input type="text" id="username" placeholder="Username" autocomplete="off">
    <input type="password" id="password" placeholder="Password">
    <button onclick="doLogin()">Login</button>
    <div class="error" id="loginError">Wrong credentials</div>
  </div>
</div>

<div class="dashboard" id="dashboard">
  <header>
    <h1>⚡ PrimeSign Control Panel</h1>
    <div>
      <span style="color:var(--muted);margin-right:12px" id="lastSaved"></span>
      <button onclick="doLogout()">Logout</button>
    </div>
  </header>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('contact')">📞 Contact</div>
    <div class="tab" onclick="switchTab('services')">🛠️ Services</div>
    <div class="tab" onclick="switchTab('portfolio')">🖼️ Portfolio</div>
    <div class="tab" onclick="switchTab('hero')">🎯 Hero</div>
    <div class="tab" onclick="switchTab('colors')">🎨 Colors</div>
  </div>

  <div id="tab-contact" class="tab-content active"></div>
  <div id="tab-services" class="tab-content"></div>
  <div id="tab-portfolio" class="tab-content"></div>
  <div id="tab-hero" class="tab-content"></div>
  <div id="tab-colors" class="tab-content"></div>

  <div class="save-bar">
    <span style="color:var(--muted);font-size:13px">Auto-saves to browser storage</span>
    <button class="btn btn-gold" onclick="saveAll()">💾 Save All Changes</button>
  </div>
</div>

<canvas id="webpCanvas"></canvas>

<script>
const ADMIN_USER = "ADMIN";
const ADMIN_PASS = "PRIMESIGNBangalore@2026*#@!2112";

const DEFAULT_CONFIG = {
  contact: {
    phone1: "+91 6366525253", phone2: "+91 8861848284", phone3: "080 49595599",
    email: "primesign2021@gmail.com",
    address: "#35, Ramamurthy Nagar Signal, T C Palya Main Road, Bangalore 560016",
    whatsapp: "+916366525253",
    youtube: "https://www.youtube.com/@PrimesignBangalore",
    instagram: "https://www.instagram.com/primesignpvtltd/",
    facebook: "https://www.facebook.com/primesign.in"
  },
  services: [
    { name: "LED Signs", desc: "High-brightness LED boards with ACP backing and 3D letters", img: "" },
    { name: "Glow Signs", desc: "Illuminated glow signs visible day and night", img: "" },
    { name: "Acrylic Signs", desc: "Laser-cut precision acrylic signs for corporate and retail", img: "" },
    { name: "Wall Branding", desc: "Custom vinyl graphics and murals", img: "" },
    { name: "Vehicle Wraps", desc: "Full and partial vehicle wraps", img: "" },
    { name: "PVC & Flex", desc: "Durable industrial signage solutions", img: "" }
  ],
  portfolio: [
    { url: "https://raw.githubusercontent.com/runloai/PrimeSign/main/data/portfolio/01.webp", label: "Storefront LED Branding", category: "led" },
    { url: "https://raw.githubusercontent.com/runloai/PrimeSign/main/data/glow/1.webp", label: "Glow Sign", category: "glow" },
    { url: "https://raw.githubusercontent.com/runloai/PrimeSign/main/data/led/1.webp", label: "LED Channel", category: "led" },
    { url: "https://raw.githubusercontent.com/runloai/PrimeSign/main/data/vehicle/1.webp", label: "Vehicle Wrap", category: "vehicle" },
  ],
  hero: {
    bgImage: "https://raw.githubusercontent.com/runloai/PrimeSign/main/data/portfolio/01.webp",
    headline: "WE BUILD <br>UNFORGETTABLE<br>VISIBILITY.",
    subtitle: "From bold LED boards to precision 3D channel letters. We engineer high-impact signage that lights up Bangalore.",
    badge: "Bangalore's Premier Signage Studio",
    stats: [
      ["500+", "Projects"],
      ["5+", "Years"],
      ["100%", "Satisfaction"],
      ["Bangalore", "Based"]
    ]
  }
};

function loadConfig() {
  try { return JSON.parse(localStorage.getItem("primesign-config")) || JSON.parse(JSON.stringify(DEFAULT_CONFIG)); }
  catch(e) { return JSON.parse(JSON.stringify(DEFAULT_CONFIG)); }
}

function saveAll() {
  localStorage.setItem("primesign-config", JSON.stringify(config));
  document.getElementById("lastSaved").textContent = "✅ Saved " + new Date().toLocaleTimeString();
}

let config = loadConfig();

function doLogin() {
  const u = document.getElementById("username").value;
  const p = document.getElementById("password").value;
  if (u === ADMIN_USER && p === ADMIN_PASS) {
    localStorage.setItem("primesign-auth", "true");
    document.getElementById("loginScreen").classList.add("hidden");
    document.getElementById("dashboard").classList.add("active");
    renderAll();
  } else {
    document.getElementById("loginError").style.display = "block";
  }
}

function doLogout() {
  localStorage.removeItem("primesign-auth");
  location.reload();
}

function switchTab(name) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
  event.target.classList.add("active");
  document.getElementById("tab-" + name).classList.add("active");
  renderTab(name);
}

function renderAll() { ["contact","services","portfolio","hero","colors"].forEach(renderTab); }

function renderTab(name) {
  const el = document.getElementById("tab-" + name);
  if (!el) return;
  if (name === "contact") renderContact(el);
  if (name === "services") renderServices(el);
  if (name === "portfolio") renderPortfolio(el);
  if (name === "hero") renderHero(el);
  if (name === "colors") renderColors(el);
}

function renderContact(el) {
  const c = config.contact;
  el.innerHTML = `<div class="card">
    <h3>📞 Contact Information</h3>
    ${field("Phone 1", "contact.phone1", c.phone1)}
    ${field("Phone 2", "contact.phone2", c.phone2)}
    ${field("Phone 3", "contact.phone3", c.phone3)}
    ${field("Email", "contact.email", c.email)}
    ${field("Address", "contact.address", c.address, true)}
    ${field("WhatsApp Number", "contact.whatsapp", c.whatsapp)}
    <div class="section-divider"></div>
    <h3>🌐 Social Links</h3>
    ${field("YouTube URL", "contact.youtube", c.youtube)}
    ${field("Instagram URL", "contact.instagram", c.instagram)}
    ${field("Facebook URL", "contact.facebook", c.facebook)}
  </div>`;
}

function renderServices(el) {
  let html = `<div class="card"><h3>🛠️ Services ("The Arsenal")</h3>`;
  config.services.forEach((s, i) => {
    html += `<div class="service-row">
      <input value="${esc(s.name)}" data-path="services.${i}.name" placeholder="Service name">
      <input value="${esc(s.desc)}" data-path="services.${i}.desc" placeholder="Description">
      <input value="${esc(s.img||'')}" data-path="services.${i}.img" placeholder="Image URL (optional)" style="max-width:200px">
      <button class="btn btn-red" onclick="deleteService(${i})">✕</button>
    </div>`;
  });
  html += `<button class="btn btn-cyan" onclick="addService()" style="margin-top:12px">+ Add Service</button></div>`;
  el.innerHTML = html;
  attachInputs(el);
}

function renderPortfolio(el) {
  let html = `<div class="card"><h3>🖼️ Portfolio Images</h3>
    <div class="image-upload-area" onclick="document.getElementById('fileInput').click()">
      📁 Click to upload images (auto-converts to WebP)<br><small>Supported: JPG, PNG, GIF, WebP</small>
    </div>
    <div class="upload-progress" id="uploadProgress"></div>
    <input type="file" id="fileInput" accept="image/*" multiple onchange="handleImageUpload(event)" style="display:none">
    <div id="uploadedPreview"></div>`;
  config.portfolio.forEach((p, i) => {
    html += `<div class="portfolio-row">
      <img src="${p.url}" class="preview-img" onerror="this.style.display='none'" alt="">
      <input value="${esc(p.url)}" data-path="portfolio.${i}.url" placeholder="Image URL">
      <input value="${esc(p.label)}" data-path="portfolio.${i}.label" placeholder="Label" style="max-width:150px">
      <input value="${esc(p.category||'')}" data-path="portfolio.${i}.category" placeholder="Category" style="max-width:100px">
      <button class="btn btn-red" onclick="deletePortfolio(${i})">✕</button>
    </div>`;
  });
  html += `<button class="btn btn-cyan" onclick="addPortfolio()">+ Add Image</button></div>`;
  el.innerHTML = html;
  attachInputs(el);
}

function renderHero(el) {
  const h = config.hero;
  el.innerHTML = `<div class="card"><h3>🎯 Hero Section</h3>
    ${field("Background Image URL", "hero.bgImage", h.bgImage)}
    ${field("Badge Text", "hero.badge", h.badge)}
    ${field("Headline (HTML allowed)", "hero.headline", h.headline, true)}
    ${field("Subtitle", "hero.subtitle", h.subtitle, true)}
  </div>`;
}

function renderColors(el) {
  const schemes = ["Obsidian Gold","Plasma Purple","Electric Blue","Crimson Noir","Emerald Glow","Neon Nights","Arctic White","Sandstone","Royal Velvet","Thunderbolt","Midnight Copper","Sky Light","Warm Cream","Mint Fresh","Lavender Dream"];
  const current = localStorage.getItem("primesign-scheme") || "Obsidian Gold";
  let html = `<div class="card"><h3>🎨 Color Scheme</h3><p style="color:var(--muted);margin-bottom:12px">Current: <b>${current}</b> — Click to change</p><div class="color-grid">`;
  schemes.forEach(s => {
    html += `<div class="color-chip ${s===current?'selected':''}" onclick="setColorScheme('${s}')">${s}</div>`;
  });
  html += `</div></div>`;
  el.innerHTML = html;
}

function setColorScheme(name) {
  localStorage.setItem("primesign-scheme", name);
  renderTab("colors");
}

function field(label, path, value, textarea) {
  const t = textarea ? "textarea" : `input type="text"`;
  return `<label>${label}</label><${t} value="${esc(value||'')}" data-path="${path}">${textarea?esc(value||''):''}</${t}>`;
}

function esc(s) { return (s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function attachInputs(el) {
  el.querySelectorAll("input, textarea").forEach(inp => {
    inp.addEventListener("change", () => updateValue(inp));
    inp.addEventListener("blur", () => updateValue(inp));
  });
}

function updateValue(inp) {
  const path = inp.dataset.path;
  if (!path) return;
  const parts = path.split(".");
  let obj = config;
  for (let i = 0; i < parts.length - 1; i++) obj = obj[parts[i]];
  if (parts[0] === "services" || parts[0] === "portfolio") {
    const idx = parseInt(parts[1]);
    obj = config[parts[0]][idx];
    obj[parts[2]] = inp.value;
  } else {
    obj[parts[parts.length - 1]] = inp.value;
  }
}

function addService() {
  config.services.push({ name: "New Service", desc: "", img: "" });
  renderTab("services");
}

function deleteService(i) {
  if (confirm("Delete this service?")) { config.services.splice(i, 1); renderTab("services"); }
}

function addPortfolio() {
  config.portfolio.push({ url: "", label: "New Image", category: "" });
  renderTab("portfolio");
}

function deletePortfolio(i) {
  if (confirm("Delete this image?")) { config.portfolio.splice(i, 1); renderTab("portfolio"); }
}

async function handleImageUpload(e) {
  const files = e.target.files;
  const progress = document.getElementById("uploadProgress");
  const preview = document.getElementById("uploadedPreview");
  progress.style.display = "block";
  progress.style.width = "0%";

  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    const webpDataUrl = await convertToWebP(file);
    config.portfolio.push({ url: webpDataUrl, label: file.name.replace(/\.[^.]+$/, ""), category: "" });
    progress.style.width = ((i + 1) / files.length * 100) + "%";
    preview.innerHTML += `<img src="${webpDataUrl}" class="preview-img" style="max-width:80px;max-height:60px">`;
  }

  progress.style.display = "none";
  renderTab("portfolio");
}

function convertToWebP(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = function() {
      const img = new Image();
      img.onload = function() {
        const canvas = document.getElementById("webpCanvas");
        const maxW = 1200, maxH = 1200;
        let w = img.width, h = img.height;
        if (w > maxW) { h = h * maxW / w; w = maxW; }
        if (h > maxH) { w = w * maxH / h; h = maxH; }
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/webp", 0.85));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

// Init
if (localStorage.getItem("primesign-auth") === "true") {
  document.getElementById("loginScreen").classList.add("hidden");
  document.getElementById("dashboard").classList.add("active");
  renderAll();
}

// Auto-save on page leave
window.addEventListener("beforeunload", () => saveAll());
</script>
</body>
</html>
